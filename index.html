<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Drive - Google Docs</title>
    <link rel="icon" type="image/x-icon" href="gstatic.com">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding-top: 60px; margin: 0; overflow: hidden; }
        h1 { color: #2ecc71; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 1.1rem; }
        
        .grid-container { display: flex; justify-content: center; gap: 25px; margin-top: 40px; flex-wrap: wrap; padding: 0 20px; }
        
        .card { background: #1e1e1e; border: 1px solid #333333; border-radius: 12px; width: 240px; padding: 25px; cursor: pointer; text-decoration: none; color: #ffffff; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card:hover { border-color: #2ecc71; transform: translateY(-4px); background: #252525; }
        .card h3 { margin: 0 0 10px 0; color: #ffffff; font-size: 1.4rem; }
        .card p { font-size: 0.9rem; color: #777777; margin: 0; }
        
        #game-vault { display: none; width: 100vw; height: 100vh; border: none; position: absolute; top: 0; left: 0; z-index: 9999; background: #121212; }
    </style>
</head>
<body>

    <div id="portal-ui">
        <h1>GCSE Listening Portal & Revision Notes</h1>
        <p>Select an assignment module below to view course materials.</p>

        <div class="grid-container">
            <div class="card" onclick="launchVault()">
                <h3>Module 1.1 - Oral Practice</h3>
                <p>Strategic Optimization & Fast Reaction time simulation</p>
            </div>
        </div>
    </div>

    <!-- Hidden portal window loading the massive unblocked multi-game catalog -->
    <iframe id="game-vault" src="github.io"></iframe>

    <script>
        window.history.replaceState(null, "Google Workspace", "/assigned-tasks/view-folders");

        function launchVault() {
            document.getElementById('portal-ui').style.display = 'none';
            document.getElementById('game-vault').style.display = 'block';
        }

        // Panic Button: Tap the 'Escape' key to instantly drop to Google Classroom
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                window.location.replace('https://google.com');
            }
        });
    </script>

</body>
</html>
