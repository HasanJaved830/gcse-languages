<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Game Portal</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px;
        }
        h1 {
            color: #2ecc71;
            font-size: 2.5rem;
        }
        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .card:hover {
            border-color: #2ecc71;
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

<h1>My Game Portal</h1>
<p>Select a game to play</p>

<div class="grid">
    <a class="card" href="Car-Race-master/index.html">Car Race</a>
    <a class="card" href="retrobowl/index.html">Retro Bowl</a>
    <a class="card" href="granny3/index.html">Granny 3</a>
</div>

</body>
</html>
